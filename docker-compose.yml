version: '3.8'

services:
  # Python pipeline service
  parser:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./python:/app
    command: python main.py serve --port 8000

  # Node.js CLI (for development)
  cli:
    image: node:20-slim
    working_dir: /app
    volumes:
      - ./node:/app
      - ./python:/python
    env_file:
      - .env
    environment:
      - PYTHON_PATH=python
      - PYTHON_MAIN=/python/main.py
    command: sh -c "npm install && npm run dev -- status"
    depends_on:
      - parser

  # Local PostgreSQL for testing (optional)
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sec_parser
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d

volumes:
  postgres_data:
